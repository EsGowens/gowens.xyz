<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      // Fix for "setting getter-only property 'fetch'" in sandboxed iframe environments
      (function() {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(value) {
              currentFetch = value;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Failed to patch fetch property:', e);
        }
      })();
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..0,800;1,100..0,800&display=swap" rel="stylesheet">

    %sveltekit.head%
  </head>
  <body class="bg-[#121212] text-[#f7f7f7] min-h-screen font-sans antialiased selection:bg-[#00ffcc] selection:text-black">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
